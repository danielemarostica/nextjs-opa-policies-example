version: "3.8"

services:
  opa:
    image: openpolicyagent/opa:latest
    ports:
      - "8181:8181"
    volumes:
      - ./opa/policies:/policies
    command:
      - "run"
      - "--server"
      - "--log-level=debug"
      - "--addr=0.0.0.0:8181"
      - "/policies"
    healthcheck:
      test: ["CMD", "/opa", "eval", "true"]
      interval: 5s
      timeout: 3s
      retries: 5
    develop:
      watch:
        - action: sync
          path: ./opa/policies
          target: /policies

  nextjs:
    build: .
    ports:
      - "3000:3000"
    environment:
      - OPA_URL=http://opa:8181
    depends_on:
      opa:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./app
          target: /app/app
        - action: sync
          path: ./lib
          target: /app/lib
        - action: sync
          path: ./middleware.ts
          target: /app/middleware.ts
        - action: rebuild
          path: ./package.json
